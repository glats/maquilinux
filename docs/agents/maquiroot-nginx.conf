# Nginx Configuration for maquiroot.glats.org
# Static file server for Maqui Linux rootfs backups

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maquiroot.glats.org;

    # SSL certificates (use Let's Encrypt or your own)
    ssl_certificate /etc/letsencrypt/live/maquiroot.glats.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maquiroot.glats.org/privkey.pem;

    # Root directory for rootfs files
    root /var/www/maquiroot;

    # Enable directory listing for archive directories
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;
    autoindex_format html;

    # Default to JSON for API-like access
    location = /index.json {
        default_type application/json;
        try_files /index.json =404;
    }

    # Latest directory - special handling
    location /latest/ {
        # Disable directory listing for cleaner look
        autoindex off;
        
        # Ensure proper MIME types
        location ~ \.tar\.xz$ {
            add_header Content-Type application/x-xz;
            add_header Content-Disposition "attachment; filename=$1";
        }
        
        location ~ \.sha256$ {
            add_header Content-Type text/plain;
        }
        
        location = /latest/metadata.json {
            add_header Content-Type application/json;
            add_header Cache-Control "no-cache";
        }
    }

    # Date-based directories
    location ~ ^/\d{4}-\d{2}-\d{2}/$ {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    # Bootstrap directory
    location /bootstrap/ {
        autoindex on;
    }

    # Logging
    access_log /var/log/nginx/maquiroot-access.log;
    error_log /var/log/nginx/maquiroot-error.log;

    # Rate limiting for downloads (optional)
    limit_conn_zone $binary_remote_addr zone=download:10m;
    limit_conn download 10;
    
    limit_rate_after 100m;  # Allow fast start
    limit_rate 5m;          # Then limit to 5MB/s per connection

    # Gzip for metadata files
    gzip on;
    gzip_types application/json text/plain text/html;
    gzip_min_length 1000;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name maquiroot.glats.org;
    
    location /.well-known/acme-challenge/ {
        # Allow Let's Encrypt validation
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}
