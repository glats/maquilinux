name: Build RPMs

on:
  workflow_dispatch:
    inputs:
      specs:
        description: 'Specs to build (comma-separated, in exact order)'
        required: true
        type: string
        default: ''
      tag:
        description: 'Build tag (for backup naming)'
        required: false
        type: string
        default: 'manual'
  push:
    branches: [main]
    paths:
      - 'SPECS/*.spec'
      - 'SOURCES/*'

jobs:
  build:
    name: Build RPM packages
    runs-on: [self-hosted, maquilinux]
    timeout-minutes: 360
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Load configuration
        run: |
          source mql.conf 2>/dev/null || true
          source mql.local 2>/dev/null || true
          echo "MQL_LFS=${MQL_LFS:-/run/media/glats/maquilinux}" >> $GITHUB_ENV
      
      - name: Verify overlay mounted
        run: |
          if ! mountpoint -q "$MQL_LFS/merged" 2>/dev/null; then
            echo "❌ Overlay not mounted at $MQL_LFS/merged"
            exit 1
          fi
          echo "✅ Overlay mounted"
      
      - name: Determine build list
        id: list
        run: |
          if [ -n "${{ github.event.inputs.specs }}" ]; then
            # Manual: use exact list provided
            SPECS="${{ github.event.inputs.specs }}"
            TAG="${{ github.event.inputs.tag }}"
          else
            # Auto: detect changed specs from last commit
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'SPECS/*.spec' | sed 's|SPECS/||; s|\.spec$||' | tr '\n' ',' | sed 's/,$//')
            if [ -n "$CHANGED" ]; then
              SPECS="$CHANGED"
            else
              echo "No specs changed in last commit"
              exit 0
            fi
            TAG="auto-$(date +%Y%m%d-%H%M%S)"
          fi
          
          echo "specs=$SPECS" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📋 Build order: $SPECS"
      
      - name: Backup before build
        if: steps.list.outputs.specs != ''
        run: |
          ./scripts/run-in-chroot.sh /workspace/mql backup create "pre-build-${{ steps.list.outputs.tag }}" || true
      
      - name: Check disk space
        if: steps.list.outputs.specs != ''
        run: |
          FREE_GB=$(df -BG "$MQL_LFS" | tail -1 | awk '{print $4}' | sed 's/G//')
          if [[ "$FREE_GB" -lt 10 ]]; then
            echo "❌ Need 10GB free, have ${FREE_GB}GB"
            exit 1
          fi
          echo "✅ Disk: ${FREE_GB}GB free"
      
      - name: Fetch sources and build
        if: steps.list.outputs.specs != ''
        run: |
          IFS=',' read -ra SPECS <<< "${{ steps.list.outputs.specs }}"
          
          for spec in "${SPECS[@]}"; do
            spec=$(echo "$spec" | xargs)  # trim whitespace
            [ -z "$spec" ] && continue
            
            echo ""
            echo "=========================================="
            echo "📦 Processing: $spec"
            echo "=========================================="
            
            # Verify spec exists
            if [ ! -f "SPECS/${spec}.spec" ]; then
              echo "❌ Spec not found: SPECS/${spec}.spec"
              exit 1
            fi
            
            # Fetch sources (on host, chroot has no internet)
            echo "🔽 Fetching sources..."
            ./scripts/fetch-spec-sources.sh "$spec"
            
            # Build for both architectures
            echo "🔨 Building x86_64..."
            ./scripts/run-in-chroot.sh /workspace/mql build "$spec" --arch x86_64
            
            echo "🔨 Building i686..."
            ./scripts/run-in-chroot.sh /workspace/mql build "$spec" --arch i686
            
            # Install to rootfs for dependencies
            echo "📥 Installing to rootfs..."
            for rpm in RPMS/x86_64/${spec}-[0-9]*.rpm RPMS/i686/${spec}-[0-9]*.rpm; do
              if [ -f "$rpm" ]; then
                ./scripts/run-in-chroot.sh rpm -Uvh --nodeps --noscripts --nosignature "/workspace/$rpm" --dbpath /var/lib/rpm || true
              fi
            done
            ./scripts/run-in-chroot.sh ldconfig
            
            echo "✅ $spec complete"
          done
      
      - name: Sign RPMs
        if: steps.list.outputs.specs != ''
        run: |
          for rpm in RPMS/x86_64/*.rpm; do
            if [ -f "$rpm" ]; then
              nix shell nixpkgs#rpm -c rpmsign \
                --define '_gpg_name Maqui Linux <security@maqui-linux.org>' \
                --define '__gpg /run/current-system/sw/bin/gpg' \
                --addsign "$rpm" 2>&1 || true
            fi
          done
      
      - name: Update local repo
        if: steps.list.outputs.specs != ''
        run: |
          sudo cp RPMS/x86_64/*.rpm /srv/glats/nginx/repo/linux/maquilinux/26.4/x86_64/stable/ 2>/dev/null || true
          sudo cp RPMS/i686/*.rpm /srv/glats/nginx/repo/linux/maquilinux/26.4/i686/stable/ 2>/dev/null || true
          nix shell nixpkgs#createrepo_c -c sudo createrepo_c /srv/glats/nginx/repo/linux/maquilinux/26.4/x86_64/stable/
          nix shell nixpkgs#createrepo_c -c sudo createrepo_c /srv/glats/nginx/repo/linux/maquilinux/26.4/i686/stable/
      
      - name: Sync to repo.glats.org
        if: steps.list.outputs.specs != '' && success()
        run: |
          echo "🔄 Syncing to repo.glats.org..."
          rsync -avz --delete \
            /srv/glats/nginx/repo/linux/maquilinux/26.4/x86_64/stable/ \
            rog:/srv/repo/linux/maquilinux/26.4/x86_64/stable/
          rsync -avz --delete \
            /srv/glats/nginx/repo/linux/maquilinux/26.4/i686/stable/ \
            rog:/srv/repo/linux/maquilinux/26.4/i686/stable/
          echo "✅ Synced to repo.glats.org"
      
      - name: Success backup
        if: success() && steps.list.outputs.specs != ''
        run: |
          ./scripts/run-in-chroot.sh /workspace/mql backup create "post-build-${{ steps.list.outputs.tag }}" || true
          echo "✅ Build complete"
      
      - name: Failure notification
        if: failure() && steps.list.outputs.specs != ''
        run: |
          echo "❌ Build failed"
          echo "Restore: mql backup restore pre-build-${{ steps.list.outputs.tag }}"
