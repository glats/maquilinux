name: Build RPMs

on:
  workflow_dispatch:
    inputs:
      specs:
        description: 'Specs to build (comma-separated, in exact order)'
        required: true
        type: string
        default: ''
      tag:
        description: 'Build tag (for backup naming)'
        required: false
        type: string
        default: 'manual'
  push:
    branches: [main]
    paths:
      - 'SPECS/*.spec'
      - 'SOURCES/*'

jobs:
  build:
    name: Build RPM packages
    runs-on: [self-hosted, maquilinux]
    timeout-minutes: 360
    
    env:
      # NixOS: ensure wrappers bin is first for sudo with setuid
      PATH: "/run/wrappers/bin:/run/current-system/sw/bin:/usr/bin:/bin"
    
    steps:
      - name: Verify runner environment
        run: |
          # Verify sudo works (required for chroot)
          if ! sudo -n true 2>/dev/null; then
            echo "❌ Sudo requires password - configure passwordless sudo for runner user"
            exit 1
          fi
          echo "✅ Sudo ready"
          
          # Verify chroot command available
          if ! command -v chroot &> /dev/null; then
            echo "❌ chroot not found - install util-linux"
            exit 1
          fi
          echo "✅ chroot: $(which chroot)"
      
      - name: Cleanup previous artifacts
        run: |
          # Remove files owned by root from previous builds
          sudo rm -rf "$GITHUB_WORKSPACE/RPMS" || true
          sudo rm -rf "$GITHUB_WORKSPACE/SOURCES"/*.tar.* || true
          rm -rf "$GITHUB_WORKSPACE/.git/config.lock" || true
          echo "✅ Cleanup complete"
      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Load configuration
        run: |
          source "$GITHUB_WORKSPACE/mql.conf" 2>/dev/null || true
          source "$GITHUB_WORKSPACE/mql.local" 2>/dev/null || true
          echo "MQL_DISK=${MQL_DISK:-/run/media/glats/maquilinux}" >> $GITHUB_ENV
      
      - name: Verify overlay and setup chroot
        run: |
          # Verify overlay mounted
          if ! mountpoint -q "$MQL_DISK/merged" 2>/dev/null; then
            echo "❌ Overlay not mounted at $MQL_DISK/merged"
            echo "Mount with: sudo mount -t overlay overlay -o lowerdir=$MQL_DISK/base,upperdir=$MQL_DISK/layers/upper,workdir=$MQL_DISK/layers/work $MQL_DISK/merged"
            exit 1
          fi
          echo "✅ Overlay mounted"
          
          # Verify rpmbuild in chroot (rootfs must have it)
          if [[ ! -x "$MQL_DISK/merged/usr/bin/rpmbuild" ]]; then
            echo "❌ rpmbuild not found in chroot - rootfs must have rpm package installed"
            exit 1
          fi
          echo "✅ rpmbuild available in chroot"
          
          # Bind mount workspace into chroot
          sudo mkdir -p "$MQL_DISK/merged/workspace"
          if ! mountpoint -q "$MQL_DISK/merged/workspace" 2>/dev/null; then
            sudo mount --bind "$GITHUB_WORKSPACE" "$MQL_DISK/merged/workspace"
            echo "✅ Workspace bind-mounted"
          fi
          
          # Mount virtual filesystems for chroot
          if ! mountpoint -q "$MQL_DISK/merged/proc" 2>/dev/null; then
            sudo mount -t proc proc "$MQL_DISK/merged/proc" || true
          fi
          if ! mountpoint -q "$MQL_DISK/merged/dev" 2>/dev/null; then
            sudo mount --bind /dev "$MQL_DISK/merged/dev" || true
          fi
          
          echo "✅ Chroot environment ready"
      
      - name: Determine build list
        id: list
        run: |
          if [ -n "${{ github.event.inputs.specs }}" ]; then
            SPECS="${{ github.event.inputs.specs }}"
            TAG="${{ github.event.inputs.tag }}"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'SPECS/*.spec' | sed 's|SPECS/||; s|\.spec$||' | tr '\n' ',' | sed 's/,$//')
            if [ -n "$CHANGED" ]; then
              SPECS="$CHANGED"
            else
              echo "No specs changed"
              exit 0
            fi
            TAG="auto-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "specs=$SPECS" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📋 Build order: $SPECS"
      
      - name: Backup before build
        if: steps.list.outputs.specs != ''
        run: |
          ./scripts/run-in-chroot.sh /workspace/mql backup create "pre-build-${{ steps.list.outputs.tag }}" || true
      
      - name: Check disk space
        if: steps.list.outputs.specs != ''
        run: |
          FREE_GB=$(df -BG "$MQL_DISK" | tail -1 | awk '{print $4}' | sed 's/G//')
          [[ "$FREE_GB" -lt 10 ]] && { echo "❌ Need 10GB free, have ${FREE_GB}GB"; exit 1; }
          echo "✅ Disk: ${FREE_GB}GB free"
      
      - name: Fetch sources and build
        if: steps.list.outputs.specs != ''
        run: |
          IFS=',' read -ra SPECS <<< "${{ steps.list.outputs.specs }}"
          
          for spec in "${SPECS[@]}"; do
            spec=$(echo "$spec" | xargs)
            [ -z "$spec" ] && continue
            
            echo ""
            echo "=========================================="
            echo "📦 Processing: $spec"
            echo "=========================================="
            
            # Fetch sources (on host, has internet)
            ./scripts/fetch-spec-sources.sh "$spec"
            
            # Build inside chroot (x86_64)
            ./scripts/build-spec.sh "$spec" --arch x86_64
            
            # Build inside chroot (i686) - skip if spec is noarch or x86_64 only
            if ! grep -Eq '^ExclusiveArch:[[:space:]]*x86_64' "SPECS/${spec}.spec"; then
              ./scripts/build-spec.sh "$spec" --arch i686 || echo "⚠️  i686 build failed or not supported"
            fi
            
            # Install to rootfs
            for rpm in RPMS/x86_64/${spec}-[0-9]*.rpm RPMS/i686/${spec}-[0-9]*.rpm; do
              [ -f "$rpm" ] && ./scripts/run-in-chroot.sh dnf install -y "/workspace/$rpm" || true
            done
            ./scripts/run-in-chroot.sh ldconfig
            
            echo "✅ $spec complete"
          done
      
      - name: Sign RPMs
        if: steps.list.outputs.specs != ''
        run: |
          for rpm in RPMS/x86_64/*.rpm; do
            [ -f "$rpm" ] && nix shell nixpkgs#rpm -c rpmsign \
              --define '_gpg_name Maqui Linux <security@maqui-linux.org>' \
              --addsign "$rpm" 2>&1 || true
          done
      
      - name: Update local repo
        if: steps.list.outputs.specs != ''
        run: |
          sudo cp RPMS/x86_64/*.rpm /srv/glats/nginx/repo/linux/maquilinux/26.4/x86_64/stable/ 2>/dev/null || true
          sudo cp RPMS/i686/*.rpm /srv/glats/nginx/repo/linux/maquilinux/26.4/i686/stable/ 2>/dev/null || true
          nix shell nixpkgs#createrepo_c -c sudo createrepo_c /srv/glats/nginx/repo/linux/maquilinux/26.4/x86_64/stable/
          nix shell nixpkgs#createrepo_c -c sudo createrepo_c /srv/glats/nginx/repo/linux/maquilinux/26.4/i686/stable/
      
      - name: Sync to repo.glats.org
        if: steps.list.outputs.specs != '' && success()
        run: |
          rsync -avz --delete /srv/glats/nginx/repo/linux/maquilinux/26.4/x86_64/stable/ rog:/srv/repo/linux/maquilinux/26.4/x86_64/stable/
          rsync -avz --delete /srv/glats/nginx/repo/linux/maquilinux/26.4/i686/stable/ rog:/srv/repo/linux/maquilinux/26.4/i686/stable/
          echo "✅ Synced to repo.glats.org"
      
      - name: Success backup
        if: success() && steps.list.outputs.specs != ''
        run: |
          ./scripts/run-in-chroot.sh /workspace/mql backup create "post-build-${{ steps.list.outputs.tag }}" || true
          echo "✅ Build complete!"
      
      - name: Failure notification
        if: failure() && steps.list.outputs.specs != ''
        run: |
          echo "❌ Build failed"
          echo "Restore: mql backup restore pre-build-${{ steps.list.outputs.tag }}"
