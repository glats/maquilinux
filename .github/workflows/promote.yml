name: Promote Backup to Stable

on:
  workflow_dispatch:
    inputs:
      backup_tag:
        description: 'Backup to promote (e.g., post-build-rust-20260418-120000)'
        required: true
        type: string
      skip_validation:
        description: 'Skip validation tests (only for emergencies)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run - do not actually sync to maquiroot'
        required: false
        type: boolean
        default: false

jobs:
  validate-and-promote:
    name: Validate and Promote Backup
    runs-on: [self-hosted, maquilinux]
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Load configuration
        run: |
          source mql.conf 2>/dev/null || true
          echo "MQL_LFS=${MQL_LFS:-/run/media/glats/maquilinux}" >> $GITHUB_ENV
      
      - name: Verify backup exists
        run: |
          BACKUP_TAG="${{ github.event.inputs.backup_tag }}"
          BACKUP_FILE="$HOME/maqui-backups/maquilinux-*-${BACKUP_TAG}.tar.xz"
          
          # Find the actual file
          BACKUP_PATH=$(ls -t $HOME/maqui-backups/maquilinux-*-${BACKUP_TAG}.tar.xz 2>/dev/null | head -1)
          
          if [ -z "$BACKUP_PATH" ] || [ ! -f "$BACKUP_PATH" ]; then
            echo "❌ Backup not found: ${BACKUP_TAG}"
            echo "Available backups:"
            ls -la $HOME/maqui-backups/maquilinux-*.tar.xz 2>/dev/null | head -10
            exit 1
          fi
          
          echo "backup_path=$BACKUP_PATH" >> $GITHUB_OUTPUT
          echo "✅ Found backup: $(basename $BACKUP_PATH)"
          
          # Show metadata if exists
          META_FILE="${BACKUP_PATH}.meta"
          if [ -f "$META_FILE" ]; then
            echo "📋 Backup metadata:"
            cat "$META_FILE"
          fi
      
      - name: Validation tests
        if: ${{ !github.event.inputs.skip_validation }}
        run: |
          BACKUP_PATH="${{ steps.verify.outputs.backup_path }}"
          
          echo "🧪 Running validation tests..."
          
          # Test 1: Backup integrity (tar -t)
          echo "Test 1: Backup integrity..."
          if ! tar -tzf "$BACKUP_PATH" > /dev/null 2>&1; then
            echo "❌ Backup archive is corrupted"
            exit 1
          fi
          echo "✅ Backup integrity OK"
          
          # Test 2: Check critical files exist in archive
          echo "Test 2: Critical files present..."
          CRITICAL_FILES=(
            "./usr/bin/dnf"
            "./usr/bin/rpm"
            "./var/lib/rpm/Packages"
            "./etc/dnf/dnf.conf"
          )
          
          for file in "${CRITICAL_FILES[@]}"; do
            if ! tar -tzf "$BACKUP_PATH" | grep -q "^$file$"; then
              echo "❌ Missing critical file: $file"
              exit 1
            fi
          done
          echo "✅ Critical files present"
          
          # Test 3: Restore to temp and verify DNF works
          echo "Test 3: DNF functionality..."
          TEMP_CHROOT="/tmp/maqui-validate-$$"
          mkdir -p "$TEMP_CHROOT"
          
          # Extract backup
          tar -xzf "$BACKUP_PATH" -C "$TEMP_CHROOT" 2>/dev/null || {
            echo "❌ Failed to extract backup"
            rm -rf "$TEMP_CHROOT"
            exit 1
          }
          
          # Mount necessary filesystems
          mount --bind /proc "$TEMP_CHROOT/proc" 2>/dev/null || true
          mount --bind /dev "$TEMP_CHROOT/dev" 2>/dev/null || true
          cp /etc/resolv.conf "$TEMP_CHROOT/etc/resolv.conf" 2>/dev/null || true
          
          # Test DNF in chroot
          if ! chroot "$TEMP_CHROOT" /usr/bin/dnf --version > /dev/null 2>&1; then
            echo "❌ DNF not working in chroot"
            umount "$TEMP_CHROOT/proc" 2>/dev/null || true
            umount "$TEMP_CHROOT/dev" 2>/dev/null || true
            rm -rf "$TEMP_CHROOT"
            exit 1
          fi
          
          # Test rpm -qa (should return packages, not error)
          PKG_COUNT=$(chroot "$TEMP_CHROOT" /usr/bin/rpm -qa 2>/dev/null | wc -l)
          if [ "$PKG_COUNT" -lt 100 ]; then
            echo "❌ RPM database seems incomplete (only $PKG_COUNT packages)"
            umount "$TEMP_CHROOT/proc" 2>/dev/null || true
            umount "$TEMP_CHROOT/dev" 2>/dev/null || true
            rm -rf "$TEMP_CHROOT"
            exit 1
          fi
          
          echo "✅ DNF and RPM working ($PKG_COUNT packages)"
          
          # Cleanup
          umount "$TEMP_CHROOT/proc" 2>/dev/null || true
          umount "$TEMP_CHROOT/dev" 2>/dev/null || true
          rm -rf "$TEMP_CHROOT"
          
          echo "✅ All validation tests passed"
      
      - name: Promote to maquiroot (dry run)
        if: ${{ github.event.inputs.dry_run }}
        run: |
          BACKUP_PATH="${{ steps.verify.outputs.backup_path }}"
          
          echo "🏃 DRY RUN - Would promote:"
          echo "  Source: $BACKUP_PATH"
          echo "  Destination: rog:/srv/glats/nginx/maquiroot/latest/"
          echo "  As: maquilinux-rootfs-latest.tar.xz"
          
          # Show what would be synced
          echo ""
          echo "Files in backup (top 20):"
          tar -tzf "$BACKUP_PATH" | head -20
          
          echo ""
          echo "✅ Dry run complete. Run without 'dry_run' to actually promote."
      
      - name: Promote to maquiroot
        if: ${{ !github.event.inputs.dry_run }}
        run: |
          BACKUP_PATH="${{ steps.verify.outputs.backup_path }}"
          BACKUP_NAME=$(basename "$BACKUP_PATH")
          
          echo "🚀 Promoting backup to maquiroot..."
          echo "  Source: $BACKUP_PATH"
          echo "  Size: $(du -h "$BACKUP_PATH" | cut -f1)"
          
          # Ensure maquiroot directory exists
          ssh rog "mkdir -p /srv/glats/nginx/maquiroot/latest /srv/glats/nginx/maquiroot/history"
          
          # Sync to latest/ (overwrites previous latest)
          echo "📤 Syncing to latest/..."
          rsync -avz --progress \
            "$BACKUP_PATH" \
            rog:/srv/glats/nginx/maquiroot/latest/maquilinux-rootfs-latest.tar.xz
          
          # Also sync metadata
          if [ -f "${BACKUP_PATH}.meta" ]; then
            rsync -avz "${BACKUP_PATH}.meta" \
              rog:/srv/glats/nginx/maquiroot/latest/maquilinux-rootfs-latest.tar.xz.meta
          fi
          
          # Also archive to history/ with timestamp
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          HIST_NAME="maquilinux-${TIMESTAMP}-stable.tar.xz"
          
          echo "📚 Archiving to history/${HIST_NAME}..."
          ssh rog "cp /srv/glats/nginx/maquiroot/latest/maquilinux-rootfs-latest.tar.xz \
            /srv/glats/nginx/maquiroot/history/${HIST_NAME}"
          
          echo ""
          echo "✅ Promotion complete!"
          echo ""
          echo "📍 URLs:"
          echo "  Latest: https://maquiroot.glats.org/latest/maquilinux-rootfs-latest.tar.xz"
          echo "  History: https://maquiroot.glats.org/history/${HIST_NAME}"
      
      - name: Verify promotion
        if: ${{ !github.event.inputs.dry_run }}
        run: |
          echo "🔍 Verifying promoted backup..."
          
          # Check file exists and has reasonable size
          SIZE=$(ssh rog "stat -c%s /srv/glats/nginx/maquiroot/latest/maquilinux-rootfs-latest.tar.xz" 2>/dev/null || echo 0)
          
          if [ "$SIZE" -lt 1000000000 ]; then  # Less than 1GB
            echo "❌ Promoted backup seems too small (${SIZE} bytes)"
            exit 1
          fi
          
          echo "✅ Promotion verified ($(du -h <<< $SIZE | cut -f1))"
          
          # Update index.json
          ssh rog "cd /srv/glats/nginx/maquiroot && \
            ls -1 history/*.tar.xz latest/*.tar.xz 2>/dev/null | \
            jq -R '[inputs | {file: ., type: (if contains(\"latest\") then \"latest\" else \"history\" end)}]' \
            > index.json 2>/dev/null || echo '[]' > index.json"
          
          echo "✅ Index updated"
      
      - name: Notify
        if: ${{ !github.event.inputs.dry_run }}
        run: |
          BACKUP_TAG="${{ github.event.inputs.backup_tag }}"
          echo "📢 Promotion notification"
          echo ""
          echo "Backup '${BACKUP_TAG}' has been promoted to maquiroot.glats.org"
          echo ""
          echo "Developers can now download:"
          echo "  curl -O https://maquiroot.glats.org/latest/maquilinux-rootfs-latest.tar.xz"
          echo ""
          echo "Next CI builds will use this as base."
