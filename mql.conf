# mql.conf - Maqui Linux development tool configuration
#
# This file is committed to git and provides project-wide defaults.
# Override any value in mql.local (gitignored) or via environment variables.
# Environment variables always take precedence over both files.

# ============================================================================
# Core paths
# ============================================================================

# Root of the development disk (overlay base, layers, merged, repo)
MQL_LFS=/run/media/glats/maquilinux

# Block device for the development disk
MQL_DISK=/dev/sdd1

# ============================================================================
# Repository configuration
# ============================================================================

# Distribution release version
MQL_RELEASEVER=26.4

# Remote repo destination
MQL_REPO_DEST=/srv/glats/nginx/repo/maquilinux/${MQL_RELEASEVER}

# Public repo URL
MQL_REPO_URL=https://repo.glats.org/linux/maquilinux

# ============================================================================
# Build configuration
# ============================================================================

# Number of parallel jobs for builds
MQL_JOBS=$(nproc 2>/dev/null || echo 4)

# Extra rpmbuild flags
MQL_RPMBUILD_OPTS=

# ============================================================================
# Release configuration
# ============================================================================

# Output directory for generated artifacts
MQL_RELEASE_DIR=${MQL_PROJECT_ROOT:-$(pwd)}

# Kernel version for ISO
MQL_KERNEL_VERSION=6.17.9
